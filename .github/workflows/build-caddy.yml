name: Build and Push Custom Caddy

on:
  schedule:
    # Nightly at 2:00 AM UTC (9:00 PM CDT)
    - cron: '0 2 * * *'
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/doublej0/custom-caddy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Home Assistant on failure
        if: failure()
        uses: fjogeleit/http-request-action@v1
        with:
          url: 'https://ha.jonesopolis.com/api/webhook/github-build-failure'
          method: 'POST'
          contentType: 'application/json'
          data: '{"repo": "${{ github.repository }}", "workflow": "${{ github.workflow }}", "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
